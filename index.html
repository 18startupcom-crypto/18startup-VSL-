<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18startup — Idea Validation Course</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  /* ══════════════════════════════════════════════════
     V1 STYLES — unchanged from version 1
  ══════════════════════════════════════════════════ */
  :root {
    --orange:     #F37335;
    --orange-dk:  #E8621F;
    --orange-lt:  #FEF0E7;
    --yellow:     #FFF392;
    --dark:       #1A1A1A;
    --dark2:      #2A2A2A;
    --mid:        #494949;
    --gray:       #888888;
    --line:       #E8E8E8;
    --bg:         #FAFAFA;
    --white:      #FFFFFF;
    --green:      #2ECC8A;
    --red:        #E55050;
    --blue:       #2196CF;
    --font-display: 'Lato', 'Poppins', sans-serif;
    --font-body:    'Lato', 'Poppins', sans-serif;
    --r:  10px;
    --r2: 16px;
    --sh: 0 2px 12px rgba(0,0,0,.08);
    --sh2: 0 8px 32px rgba(0,0,0,.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--dark); font-size: 16px; line-height: 1.6; }
  img { max-width: 100%; display: block; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  .shell      { display: flex; min-height: 100vh; }
  .sidebar    { width: 280px; flex-shrink: 0; background: var(--dark); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
  .main       { flex: 1; min-width: 0; }
  .sb-logo    { padding: 28px 24px 20px; border-bottom: 1px solid #2A2A2A; }
  .sb-logo span.num { color: var(--orange); font-size: 26px; font-weight: 700; font-family: var(--font-display); }
  .sb-logo span.txt { color: var(--white); font-size: 26px; font-weight: 700; font-family: var(--font-display); }
  .sb-logo .sub     { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
  .sb-progress { padding: 16px 24px; }
  .sb-progress-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .sb-progress-bar   { background: #2A2A2A; height: 4px; border-radius: 2px; }
  .sb-progress-fill  { background: var(--orange); height: 100%; border-radius: 2px; transition: width .4s ease; }
  .sb-progress-pct   { color: var(--orange); font-size: 11px; margin-top: 4px; }
  .sb-nav  { flex: 1; padding: 8px 0 24px; }
  .sb-section-label { color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; padding: 16px 24px 6px; }
  .sb-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; cursor: pointer; transition: background .15s; border-left: 3px solid transparent; text-decoration: none; }
  .sb-item:hover    { background: #1A1A1A; }
  .sb-item.active   { background: #1E1E1E; border-left-color: var(--orange); }
  .sb-item.done .sb-dot { background: var(--green); }
  .sb-item.done .sb-item-title { color: #888; }
  .sb-dot   { width: 28px; height: 28px; border-radius: 50%; background: #2A2A2A; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700; color: #666; transition: background .2s; }
  .sb-item.active .sb-dot { background: var(--orange); color: #fff; }
  .sb-item-info { flex: 1; min-width: 0; }
  .sb-item-title { font-size: 13px; color: #BBBBBB; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-item.active .sb-item-title { color: #fff; }
  .sb-item-sub   { font-size: 11px; color: #555; margin-top: 1px; }
  .sb-check { color: var(--green); font-size: 14px; flex-shrink: 0; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--line); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--dark); }
  .topbar-actions { display: flex; gap: 12px; align-items: center; }
  .btn-sm { padding: 7px 16px; border-radius: var(--r); font-size: 13px; font-weight: 600; }
  .btn-orange { background: var(--orange); color: #fff; transition: background .15s; }
  .btn-orange:hover { background: var(--orange-dk); }
  .btn-ghost  { border: 1.5px solid var(--line); color: var(--mid); transition: border-color .15s; }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .pane       { display: none; padding: 40px; max-width: 900px; margin: 0 auto; width: 100%; text-align: center; }
  .pane.active{ display: block; }
  
  /* LOGO BAR */
  .logo-bar {
    background: var(--white);
    border-bottom: 1px solid var(--line);
    padding: 12px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-bar-content {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    justify-content: flex-start;
  }
  .logo-mark {
    width: auto;
    height: 40px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .logo-mark img {
    max-height: 40px;
    width: auto;
    object-fit: contain;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 900;
    color: var(--dark);
    font-family: var(--font-display);
    letter-spacing: -0.5px;
    display: none;
  }
  .logo-text span {
    color: var(--orange);
  }
  .hero { background: var(--dark); border-radius: var(--r2); padding: 56px 48px; margin: 0 auto 40px; max-width: 900px; position: relative; overflow: hidden; text-align: center; }
  .hero::before { content: ''; position: absolute; right: -60px; top: -60px; width: 300px; height: 300px; border-radius: 50%; background: var(--orange); opacity: .06; }
  .hero-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--orange); margin-bottom: 14px; }
  .hero-title   { font-family: var(--font-display); font-size: 40px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 16px; }
  .hero-title span { color: var(--orange); }
  .hero-sub     { font-size: 17px; color: #888; max-width: 560px; margin: 0 auto 28px; }
  .hero-stats   { display: flex; gap: 32px; justify-content: center; }
  .hero-stat-num { font-family: var(--font-display); font-size: 30px; font-weight: 700; color: var(--orange); }
  .hero-stat-lbl { font-size: 12px; color: #666; margin-top: 2px; }
  .section-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: var(--orange); color: #fff; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; padding: 5px 14px; border-radius: 4px; margin: 0 auto 20px; }
  .lesson-header { margin-bottom: 32px; text-align: center; }
  .lesson-number { font-family: var(--font-display); font-size: 72px; font-weight: 700; color: var(--orange); opacity: .15; line-height: 1; margin-bottom: -24px; }
  .lesson-title  { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
  .lesson-sub    { font-size: 16px; color: var(--orange); font-weight: 600; }
  .video-block   { background: var(--dark2); border-radius: var(--r2); overflow: hidden; margin-bottom: 32px; }
  .video-label   { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid #2A2A2A; }
  .video-label-dot { width: 8px; height: 8px; background: var(--orange); border-radius: 50%; }
  .video-label-text { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #888; }
  .video-label-title { font-size: 14px; color: #ccc; margin-left: 4px; }
  .video-container { position: relative; padding-bottom: 56.25%; background: #0A0A0A; }
  .video-container iframe, .video-container video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: #0D0D0D; }
  .video-placeholder .play-icon { width: 64px; height: 64px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .video-placeholder .play-icon svg { fill: #fff; width: 24px; height: 24px; margin-left: 4px; }
  .video-placeholder p { color: #555; font-size: 13px; }
  .video-placeholder .url-hint { font-size: 12px; color: #3A3A3A; font-family: monospace; background: #1A1A1A; padding: 6px 12px; border-radius: 4px; }
  .card-grid    { display: grid; gap: 16px; margin-bottom: 28px; }
  .card-grid-2  { grid-template-columns: 1fr 1fr; }
  .card-grid-3  { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-4  { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .card { background: var(--white); border-radius: var(--r2); padding: 24px; box-shadow: var(--sh); border: 1.5px solid var(--line); transition: box-shadow .2s, border-color .2s; }
  .card:hover { box-shadow: var(--sh2); border-color: var(--orange); }
  .card-icon  { font-size: 28px; margin-bottom: 12px; }
  .card-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
  .card-body  { font-size: 14px; color: var(--mid); line-height: 1.5; }
  .card-orange { background: var(--orange); border-color: var(--orange); }
  .card-orange .card-title, .card-orange .card-body { color: #fff; }
  .card-dark  { background: var(--dark2); border-color: #333; }
  .card-dark .card-title { color: #fff; }
  .card-dark .card-body  { color: #999; }
  .callout { border-radius: var(--r2); padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start; }
  .callout-orange { background: var(--orange-lt); border-left: 4px solid var(--orange); }
  .callout-dark   { background: var(--dark2); border-left: 4px solid var(--orange); }
  .callout-dark p { color: #ccc; }
  .callout-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .callout-text { font-size: 15px; color: var(--dark); line-height: 1.6; }
  .callout-dark .callout-text { color: #ccc; }
  .callout-text strong { color: var(--orange); }
  .score-list  { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .score-item  { display: flex; align-items: center; gap: 16px; padding: 14px 18px; border-radius: var(--r); }
  .score-0     { background: #2A2A2A; }
  .score-1     { background: #FFF8E0; }
  .score-2     { background: #FFF0E0; }
  .score-3     { background: var(--orange); }
  .score-num   { font-family: var(--font-display); font-size: 28px; font-weight: 700; width: 36px; flex-shrink: 0; text-align: center; }
  .score-0 .score-num { color: #888; }
  .score-1 .score-num, .score-2 .score-num { color: var(--orange-dk); }
  .score-3 .score-num { color: #fff; }
  .score-desc  { font-size: 15px; }
  .score-0 .score-desc { color: #888; }
  .score-1 .score-desc, .score-2 .score-desc { color: var(--dark); }
  .score-3 .score-desc { color: #fff; font-weight: 600; }
  .score-badge { margin-left: auto; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
  .score-3 .score-badge { background: rgba(255,255,255,.2); color: #fff; }
  .trait-cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-radius: var(--r2); overflow: hidden; box-shadow: var(--sh2); margin-bottom: 32px; }
  .trait-card  { padding: 28px 16px; text-align: center; background: var(--dark2); border-right: 1px solid #2A2A2A; transition: background .2s; cursor: default; }
  .trait-card:last-child { border-right: none; }
  .trait-card.active { background: var(--orange); }
  .trait-card-num  { font-family: var(--font-display); font-size: 36px; font-weight: 700; color: var(--orange); margin-bottom: 8px; }
  .trait-card.active .trait-card-num { color: #fff; }
  .trait-card-name { font-size: 13px; font-weight: 700; color: #ccc; margin-bottom: 6px; }
  .trait-card.active .trait-card-name { color: #fff; }
  .trait-card-q    { font-size: 11px; color: #666; line-height: 1.4; }
  .trait-card.active .trait-card-q { color: rgba(255,255,255,.7); }
  .trait-pts { margin-top: 12px; background: rgba(255,255,255,.08); border-radius: 20px; padding: 3px 10px; display: inline-block; font-size: 11px; font-weight: 700; color: #888; }
  .trait-card.active .trait-pts { background: rgba(255,255,255,.2); color: #fff; }
  .formula-bar { background: var(--orange); padding: 14px 24px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .5px; border-radius: 0 0 var(--r2) var(--r2); }
  .tbl-wrap  { border-radius: var(--r2); overflow: hidden; box-shadow: var(--sh); margin-bottom: 28px; }
  .tbl       { width: 100%; border-collapse: collapse; }
  .tbl thead { background: var(--orange); }
  .tbl thead th { padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
  .tbl tbody tr:nth-child(odd)  { background: var(--white); }
  .tbl tbody tr:nth-child(even) { background: #FAFAFA; }
  .tbl td   { padding: 12px 16px; font-size: 14px; color: var(--mid); border-bottom: 1px solid var(--line); }
  .tbl td:first-child { font-weight: 700; color: var(--dark); }
  .bb-block  { background: var(--dark); border-radius: var(--r2); overflow: hidden; margin-bottom: 32px; }
  .bb-header { background: #1A1A1A; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2A2A2A; }
  .bb-pill   { background: var(--orange); color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; padding: 4px 12px; border-radius: 4px; }
  .bb-trait  { border: 1.5px solid #333; color: var(--orange); font-size: 11px; padding: 3px 10px; border-radius: 4px; margin-left: auto; }
  .bb-logo   { font-size: 14px; font-weight: 700; color: #ccc; }
  .bb-score-badge { width: 60px; height: 60px; background: var(--orange); border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .bb-body   { padding: 24px; }
  .bb-title  { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .bb-intro  { font-size: 14px; color: #888; margin-bottom: 20px; }
  .bb-cards  { display: grid; gap: 12px; margin-bottom: 20px; }
  .bb-cards-3 { grid-template-columns: 1fr 1fr 1fr; }
  .bb-cards-2 { grid-template-columns: 1fr 1fr; }
  .bb-card   { background: #242424; border-radius: var(--r); overflow: hidden; }
  .bb-card-hd { padding: 10px 14px; font-size: 13px; font-weight: 700; color: #fff; }
  .bb-card-bd { padding: 12px 14px; font-size: 13px; color: #999; line-height: 1.5; }
  .bb-lesson { background: var(--orange); border-radius: var(--r); padding: 14px 18px; display: flex; gap: 10px; align-items: flex-start; }
  .bb-lesson-lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.7); flex-shrink: 0; margin-top: 2px; }
  .bb-lesson-txt { font-size: 14px; color: #fff; font-weight: 600; }
  .tracker   { background: var(--white); border-radius: var(--r2); padding: 32px; box-shadow: var(--sh2); margin-bottom: 32px; border: 1.5px solid var(--line); }
  .tracker-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 24px; }
  .tracker-rows  { display: flex; flex-direction: column; gap: 0; border-radius: var(--r); overflow: hidden; border: 1.5px solid var(--line); margin-bottom: 24px; }
  .tracker-row   { display: flex; align-items: center; gap: 16px; padding: 14px 18px; background: #FAFAFA; border-bottom: 1px solid var(--line); }
  .tracker-row:last-child { border-bottom: none; }
  .tracker-row-num  { width: 32px; height: 32px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .tracker-row-name { flex: 1; font-size: 15px; font-weight: 600; color: var(--dark); }
  .tracker-select   { display: flex; gap: 6px; }
  .tracker-btn      { width: 38px; height: 38px; border-radius: 8px; font-size: 16px; font-weight: 700; border: 2px solid var(--line); color: var(--mid); transition: all .15s; }
  .tracker-btn:hover { border-color: var(--orange); color: var(--orange); }
  .tracker-btn.selected { background: var(--orange); border-color: var(--orange); color: #fff; }
  .tracker-result   { display: flex; gap: 16px; align-items: stretch; }
  .tracker-score-box{ flex: 1; background: var(--dark); border-radius: var(--r2); padding: 20px 24px; text-align: center; }
  .tracker-score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-bottom: 8px; }
  .tracker-score-val   { font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--orange); }
  .tracker-score-max   { font-size: 18px; color: #444; }
  .tracker-verdict { flex: 1; border-radius: var(--r2); padding: 20px 24px; display: flex; flex-direction: column; justify-content: center; }
  .verdict-label   { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
  .verdict-title   { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .verdict-desc    { font-size: 14px; opacity: .85; }
  .hr { border: none; border-top: 1px solid var(--line); margin: 32px 0; }
  .lesson-nav  { display: flex; justify-content: flex-end; gap: 12px; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--line); }
  #admin-panel { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; display: none; align-items: center; justify-content: center; }
  #admin-panel.open { display: flex; }
  .admin-modal { background: var(--white); border-radius: var(--r2); width: 780px; max-height: 85vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,.3); }
  .admin-modal-hd { background: var(--dark); padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; }
  .admin-modal-hd h2 { font-family: var(--font-display); font-size: 18px; color: #fff; }
  .admin-modal-hd span { color: var(--orange); font-size: 13px; }
  .admin-close { color: #888; font-size: 22px; line-height: 1; }
  .admin-body  { padding: 28px; }
  .admin-tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 24px; }
  .admin-tab { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--gray); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .15s; background: none; }
  .admin-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .admin-tab-pane { display: none; }
  .admin-tab-pane.active { display: block; }
  .admin-field { margin-bottom: 20px; }
  .admin-field label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--mid); margin-bottom: 6px; }
  .admin-field input, .admin-field textarea, .admin-field select { width: 100%; padding: 10px 14px; border: 1.5px solid var(--line); border-radius: var(--r); font-size: 14px; font-family: var(--font-body); color: var(--dark); transition: border-color .15s; }
  .admin-field input:focus, .admin-field textarea:focus { outline: none; border-color: var(--orange); }
  .admin-field textarea { min-height: 80px; resize: vertical; }
  .admin-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .admin-section-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--dark); padding: 10px 0 8px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
  .admin-save { background: var(--orange); color: #fff; padding: 10px 24px; border-radius: var(--r); font-size: 14px; font-weight: 700; transition: background .15s; }
  .admin-save:hover { background: var(--orange-dk); }
  .admin-hint { font-size: 12px; color: #aaa; margin-top: 4px; }

  /* ══════════════════════════════════════════════════
     V2 SCORING CARD STYLES — from version 2
  ══════════════════════════════════════════════════ */
  .sc-card { background: #fff; border: 1px solid #E5E5E5; border-top: 4px solid #111; border-radius: 12px; padding: 24px; margin-top: 32px; }
  .sc-eyebrow { font-size: 11px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .sc-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
  .sc-sub { font-size: 13px; color: var(--gray); margin-bottom: 16px; }
  .sc-anchor { background: var(--orange-lt); border-left: 4px solid var(--orange); padding: 12px 16px; font-size: 13px; color: #7A2E0A; line-height: 1.6; margin-bottom: 20px; }
  .sc-anchor strong { color: #4A1B0C; }
  .sc-lbl { display: block; font-size: 12px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .sc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }

// V2 localStorage
const V2_KEY = '18s_iv_combined';
function v2Load() { try { const d = JSON.parse(localStorage.getItem(V2_KEY) || 'null'); return d || { profile: {}, entries: {}, analysis: null, feedback: null, savedToSheet: false }; } catch(e) { return { profile: {}, entries: {}, analysis: null, feedback: null, savedToSheet: false }; } }
function v2Save(d) { localStorage.setItem(V2_KEY, JSON.stringify(d)); return d; }
function v2GetEntry(id) { return v2Load().entries[id] || {}; }
function v2SetEntry(id, sc, ra) {
  const d = v2Load();
  const ex = d.entries[id] || {};
  d.entries[id] = { score: sc !== undefined ? sc : ex.score, rationale: ra !== undefined ? ra : ex.rationale || '' };
  v2Save(d);
}
function v2IsComplete(id) { const e = v2GetEntry(id); return e.score != null && (e.rationale || '').trim().length >= 40; }
function v2AllTraitsComplete() { return SCORE_TRAITS.every(t => v2IsComplete(t.id)); }
function v2CalcSelfTotal() {
  return SCORE_TRAITS.reduce((acc, t) => { const e = v2GetEntry(t.id); return acc * (e.score != null ? e.score : 0); }, 1);
}

<script>
// ── google.script.run safety shim (runs fine locally + in Apps Script) ──
if (typeof google === 'undefined' || !google.script) {
  window.google = { script: { run: new Proxy({}, {
    get: function(_, method) {
      return {
        withSuccessHandler: function(fn) { return this; },
        withFailureHandler: function(fn) {
          this._fail = fn; return this;
        },
        [method]: function() {},
      };
    }
  }) }};
  // More explicit shim for the pattern we use: .withSuccessHandler(fn).withFailureHandler(fn).method(args)
  window.google.script.run = (function() {
    function CallBuilder(methods) {
      this._success = null; this._failure = null; this._methods = methods;
    }
    CallBuilder.prototype.withSuccessHandler = function(fn) { this._success = fn; return this; };
    CallBuilder.prototype.withFailureHandler = function(fn) { this._failure = fn; return this; };
    var handler = {
      get: function(target, prop) {
        if (prop === 'withSuccessHandler' || prop === 'withFailureHandler') return target[prop].bind(target);
        // Called as: google.script.run.someMethod(args)
        return function() {
          var self = target;
          setTimeout(function() {
            if (self._failure) self._failure(new Error('google.script.run is not available when running locally. Deploy to Apps Script first.'));
          }, 100);
        };
      }
    };
    var base = new CallBuilder({});
    return new Proxy(base, handler);
  })();
}

// ── V1 state ──────────────────────────────────────────────────

// ── V1 lesson rendering ───────────────────────────────────────
function renderLesson(idx) {
  const lesson = COURSE_DATA.lessons[idx];

  // The "score" lesson is replaced entirely by the v2 review/report page
  if (lesson.id === 'score') {
    currentView = 'review';
    goReview();
    return;
  }

  document.getElementById('topbar-title').textContent = lesson.title;

  let html = `<div class="pane active" id="pane-${idx}">`;
  html += `
    <div class="lesson-header">
      <div class="lesson-number">0${idx}</div>
      <h1 class="lesson-title">${esc(lesson.title)}</h1>
      <div class="lesson-sub">${esc(lesson.subtitle)}</div>
    </div>`;

  lesson.sections.forEach(sec => { html += renderSection(sec, lesson, idx); });

  // If this lesson has a scoring trait, append the v2 scoring card
  const trait = LESSON_TRAIT_MAP[lesson.id];
  if (trait) {
    html += renderScoringCard(trait);
  }

  // Nav
  const hasPrev = idx > 0;
  const hasNext = idx < COURSE_DATA.lessons.length - 1;
  html += `<div class="lesson-nav">`;
  if (hasPrev) html += `<button class="btn-sm btn-ghost" onclick="goTo(${idx-1})">← Previous</button>`;
  if (trait) {
    // Trait lesson: save score and continue
    html += `<button class="btn-sm btn-orange" id="nav-save-btn" onclick="saveScoreAndContinue(${idx})" disabled>Save Score &amp; Continue →</button>`;
  } else if (hasNext) {
    html += `<button class="btn-sm btn-orange" onclick="markAndNext(${idx})">Mark Complete &amp; Continue →</button>`;
  } else {
    html += `<button class="btn-sm btn-orange" onclick="markDone(${idx})">Complete Course</button>`;
  }
  html += `</div></div>`;

  document.getElementById('content-area').innerHTML = html;
  window.scrollTo(0, 0);

  // Init scoring card if present
  if (trait) initScoringCard(trait.id);
}

// ── V1 section renderers ──────────────────────────────────────
function renderSection(sec, lesson, idx) {
  switch(sec.type) {
    case 'video':   return renderVideo(sec);
    case 'callout': return renderCallout(sec);
    case 'cards':   return renderCards(sec);
    case 'scoring': return renderScoring(sec);
    case 'bb':      return renderBB(sec);
    case 'table':   return renderTable(sec);
    case 'html':
      if (sec.html === 'trait_overview_widget') return renderTraitOverview();
      if (sec.html === 'score_tracker')         return renderTrackerHTML();
      return `<div>${sec.html}</div>`;
    default: return '';
  }
}
function renderVideo(sec) {
  const isYT = sec.url && sec.url.includes('youtube');
  const isFile = sec.url && (sec.url.includes('.mp4') || sec.url.includes('.webm'));
  let inner = '';
  if (isYT) inner = `<iframe src="${sec.url}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
  else if (isFile) inner = `<video controls src="${sec.url}"></video>`;
  else inner = `<div class="video-placeholder"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><p>Mentor video — <strong style="color:#E8571A">${esc(sec.title)}</strong></p><span class="url-hint">Set video URL in Admin panel → Lesson videos</span></div>`;

}

function renderScoringCard(trait) {
  const entry = v2GetEntry(trait.id);
  const sc = entry.score;
  const ra = entry.rationale || '';
  const chars = ra.length;

  const buttons = trait.opts.map(o => `
    <button class="sc-btn${sc===o.n?' selected':''}" onclick="scHandleScore('${trait.id}',${o.n})">
      <span class="sc-n">${o.n}</span>
      <span class="sc-d">${esc(o.l)}</span>
    </button>`).join('');

  const tags = trait.tags.map(tag => `
    <span class="sc-tag" onclick="scAppendTag('${trait.id}','${tag.replace(/'/g,"\\'")}')">${esc(tag)}</span>`).join('');

  const feedback = (sc != null && chars >= 40)
    ? `<div class="sc-feedback" id="sc-feedback-${trait.id}"><strong>You scored ${sc}/3.</strong> ${esc(trait.feedback[sc])}</div>`
    : `<div id="sc-feedback-${trait.id}"></div>`;

  return `
    <div class="sc-card" id="sc-card-${trait.id}">
      <div class="sc-eyebrow">Score your venture — Trait ${SCORE_TRAITS.findIndex(t=>t.id===trait.id)+1} of 5</div>
      <div class="sc-title">${esc(trait.title)}</div>
      <div class="sc-sub">${esc(trait.sub)}</div>
      <div class="sc-anchor"><strong>Score anchor:</strong> ${esc(trait.anchor)}</div>
      <div class="sc-lbl">Select your score for today</div>
      <div class="sc-buttons" id="sc-btns-${trait.id}">${buttons}</div>
      <div class="sc-ra-lbl">Your rationale <span class="sc-ra-hint">— min 40 characters, the AI mentor reads this</span></div>
      <div class="sc-tags">${tags}</div>
      <textarea class="sc-textarea" id="sc-ra-${trait.id}" placeholder="${esc(trait.ph)}" maxlength="800" oninput="scHandleRationale('${trait.id}',this.value)">${esc(ra)}</textarea>
      <div class="sc-chars${chars<40?' low':''}" id="sc-chars-${trait.id}">${chars<40?`Need ${40-chars} more characters`:`${chars} / 800`}</div>
      ${feedback}
    </div>`;
}

function initScoringCard(tid) {
  // Update the main save button state
  updateSaveBtn();
}

function scHandleScore(tid, n) {
  v2SetEntry(tid, n, undefined);
  document.querySelectorAll(`#sc-btns-${tid} .sc-btn`).forEach((btn, i) => {
    btn.classList.toggle('selected', i === n);
  });
  scCheckFeedback(tid);
  updateSaveBtn();
  renderSidebar();
}

function scHandleRationale(tid, val) {
  v2SetEntry(tid, undefined, val);
  const chars = val.length;
  const cc = document.getElementById(`sc-chars-${tid}`);
  if (cc) { cc.textContent = chars < 40 ? `Need ${40-chars} more characters` : `${chars} / 800`; cc.className = `sc-chars${chars<40?' low':''}`; }
  scCheckFeedback(tid);
  updateSaveBtn();
  renderSidebar();
}

function scCheckFeedback(tid) {
  const e = v2GetEntry(tid);
  const ready = e.score != null && (e.rationale||'').length >= 40;
  const fb = document.getElementById(`sc-feedback-${tid}`);
  if (!fb) return;
  const trait = SCORE_TRAITS.find(t => t.id === tid);
  if (ready && trait) {
    fb.className = 'sc-feedback';
    fb.innerHTML = `<strong>You scored ${e.score}/3.</strong> ${esc(trait.feedback[e.score])}`;
  } else {
    fb.className = '';
    fb.innerHTML = '';
  }
}

function scAppendTag(tid, tag) {
  const ta = document.getElementById(`sc-ra-${tid}`);
  if (!ta) return;
  const add = tag + ': ';
  const nv = (ta.value + (ta.value && !ta.value.endsWith('\n') ? '\n' : '') + add).trimStart();
  ta.value = nv;
  ta.focus();
  scHandleRationale(tid, nv);
}

function updateSaveBtn() {
  const btn = document.getElementById('nav-save-btn');
  if (!btn) return;
  const lesson = COURSE_DATA.lessons[currentIdx];
  const trait = LESSON_TRAIT_MAP[lesson.id];

// ════════════════════════════════════════════════════════════════
// AI ANALYSIS
// Works in three modes:
//   1. Apps Script web app  → proxies via google.script.run (key server-side)
//   2. Hosted elsewhere     → direct Anthropic fetch with key from localStorage
//   3. Local file           → prompts for key, stores it, then calls Anthropic
// ════════════════════════════════════════════════════════════════

// Detect whether we are inside a real Apps Script web app
function _isAppsScript() {
  try {
    return window.location.href.indexOf('script.google.com/macros') >= 0;
  } catch(e) { return false; }
}

// API key management for non-Apps Script environments
const _AK = '18s_ak';
function _getKey()  { return localStorage.getItem(_AK) || ''; }
function _saveKey(k){ localStorage.setItem(_AK, k.trim()); }
function _clearKey(){ localStorage.removeItem(_AK); }

function runAnalysis() {
  const selfTotal = v2CalcSelfTotal();
  const rows = SCORE_TRAITS.map(t => ({
    trait: t.title,
    self: (v2GetEntry(t.id).score ?? 0),
    text: (v2GetEntry(t.id).rationale ?? '')
  }));

  const prompt = 'You are an experienced startup mentor at 18startup evaluating a founder\'s idea validation self-assessment. The founder scored their venture across 5 traits (each 0-3) and provided written rationale. Read each rationale critically and assign your own honest score.\n\n'
    + 'SCORING RULES:\n'
    + '- Score ONLY on what is described as existing TODAY, not future plans\n'
    + '- Score 0: no evidence | 1: minimal, significant gaps | 2: meaningful but not fully proven | 3: strong real evidence today\n'
    + '- Plan to go viral = 0. First-mover advantage alone = 1. Will build after funding on buildability = 0\n'
    + '- Be honest and constructive\n\n'
    + rows.map((r,i) => 'TRAIT ' + (i+1) + ': ' + r.trait + '\nSelf-score: ' + r.self + '/3\nRationale: "' + r.text + '"').join('\n\n')
    + '\n\nRespond ONLY with valid JSON (no markdown, no backticks):\n'
    + '{"traits":[{"id":"t1","aiScore":2,"direction":"down","analysis":"2-3 honest sentences"},{"id":"t2","aiScore":2,"direction":"same","analysis":"..."},{"id":"t3","aiScore":1,"direction":"down","analysis":"..."},{"id":"t4","aiScore":2,"direction":"same","analysis":"..."},{"id":"t5","aiScore":3,"direction":"up","analysis":"..."}],"aiTotal":0,"topGap":"Core value proposition","verdict":"3-4 honest sentences covering what is strong today, the biggest untested assumption, and what to fix first.","nextAction":"One specific concrete action the founder can take in the next 7 days."}';

  // Show loading spinner
  document.getElementById('v2-analyse-area').innerHTML = `
    <div class="v2-loading">AI mentor is reading your rationale and scoring your venture<div class="v2-dots"><div class="v2-dot"></div><div class="v2-dot"></div><div class="v2-dot"></div></div></div>`;

  function onResult(text) {
    try {
      const analysis = JSON.parse(text.replace(/```json|```/g,'').trim());
      analysis.aiTotal = analysis.traits.reduce((acc, t) => acc * t.aiScore, 1);
      analysis.selfTotal = selfTotal;
      const db = v2Load(); db.analysis = analysis; v2Save(db);
      goReport();
    } catch(e) {
      showAnalysisError('Could not parse AI response. Please try again. (' + e.message + ')');
    }
  }

  function onError(msg) {
    showAnalysisError(msg);
  }

  if (_isAppsScript()) {
    // ── Mode 1: Served from Apps Script — use server-side proxy ──────
    google.script.run
      .withSuccessHandler(function(result) { onResult(result); })
      .withFailureHandler(function(err) {
        onError('AI analysis failed: ' + ((err && err.message) || 'Unknown error') + '. Please try again.');
      })
      .callAnthropicAPI(prompt);

  } else {
    // ── Mode 2/3: Hosted elsewhere or local — direct Anthropic call ───
    var key = _getKey();
    if (!key) {
      // Show key input inline
      document.getElementById('v2-analyse-area').innerHTML = `
        <div style="background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:12px;">
          <div style="font-size:13px;font-weight:700;color:var(--dark);margin-bottom:4px;">Anthropic API key required</div>
          <div style="font-size:12px;color:var(--gray);margin-bottom:12px;line-height:1.5;">
            This platform is not running from Google Apps Script, so an API key is needed for AI analysis.<br>
            Your key is stored only in your browser and sent only to Anthropic. Get yours at <strong>console.anthropic.com</strong>.
          </div>
          <div style="display:flex;gap:8px;">
            <input id="ak-inp" type="password" placeholder="sk-ant-..." style="flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;color:var(--dark);background:#FAFAFA;" />
            <button onclick="_saveKeyAndRun()" style="padding:9px 18px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">Save &amp; analyse</button>
          </div>
        </div>`;
      return;
    }
    _callAnthropicDirect(key, prompt, onResult, onError);
  }
}

function _saveKeyAndRun() {
  var key = (document.getElementById('ak-inp') || {}).value || '';
  if (!key || !key.startsWith('sk-')) {
    alert('Please enter a valid Anthropic API key (starts with sk-).');
    return;
  }
  _saveKey(key);
  runAnalysis();
}

function _callAnthropicDirect(key, prompt, onResult, onError) {
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1200,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.text().then(function(t) {
        if (res.status === 401) {
          _clearKey(); // key is invalid — clear it so user can re-enter
          throw new Error('Invalid API key (401). Please re-enter your key and try again.');
        }
        throw new Error('API error ' + res.status + ': ' + t.substring(0, 200));
      });
    }
    return res.json();
  })
  .then(function(data) {
    var text = data.content && data.content[0] && data.content[0].text;
    if (!text) throw new Error('Unexpected API response structure.');
    onResult(text);
  })
  .catch(function(err) {
    onError('AI analysis failed: ' + (err.message || String(err)));
  });
}

function showAnalysisError(msg) {
  const area = document.getElementById('v2-analyse-area');
  if (area) area.innerHTML = `
    <div style="background:#FDDEDE;border-radius:8px;padding:12px 16px;font-size:13px;color:#A32D2D;margin-bottom:12px;line-height:1.6;">${msg}</div>
    <button class="v2-btn v2-btn-p" style="width:100%;padding:13px" onclick="runAnalysis()">Try again</button>`;
}

function goReport() {
  currentView = 'report';
  document.getElementById('topbar-title').textContent = 'AI Reality Check Report';
  const db = v2Load();
  const a = db.analysis;
  if (!a) { goReview(); return; }

  // Always recompute selfTotal from stored entries — never trust stored value
  const selfTotal = v2CalcSelfTotal();
  const gap = a.aiTotal - selfTotal;
  const gapText = gap > 8 ? 'Significantly over-estimated' : gap > 2 ? 'Moderately over-estimated' : gap < -8 ? 'Under-estimated' : gap < -2 ? 'Slightly under-estimated' : 'Accurately calibrated';

  const metrics = [
    ['Self score', selfTotal, '#1A1A1A'],
    ['AI score', a.aiTotal, a.aiTotal>=24?'#1A6B2F':'#A32D2D'],
    ['Gap', gap>0?'+'+gap:String(gap), gap>2?'#A32D2D':gap<-2?'#1A6B2F':'#888']
  ].map(([l,v,c]) => `<div class="rp-metric"><div class="rp-metric-lbl">${l}</div><div class="rp-metric-val" style="color:${c}">${v}</div><div class="rp-metric-sub">/243</div></div>`).join('');

  const traitRows = (a.traits||[]).map((ta, i) => {
    const t = SCORE_TRAITS[i];
    const self = v2GetEntry(t.id).score ?? 0;
    const chipCls = ta.direction==='up'?'rp-chip-up':ta.direction==='down'?'rp-chip-down':'rp-chip-same';
    const arrow = ta.direction==='up'?'↑':ta.direction==='down'?'↓':'=';
    return `<div class="rp-ta"><div class="rp-ta-h"><span class="rp-ta-num">0${i+1}</span><span class="rp-ta-name">${esc(t.title)}</span><div class="rp-sc-wrap"><span class="rp-sc-self">You: ${self}/3 →</span><span class="rp-chip ${chipCls}">AI: ${ta.aiScore}/3 ${arrow}</span></div></div><p class="rp-ta-text">${esc(ta.analysis)}</p></div>`;
  }).join('');

  const vc = a.aiTotal>=24?'rp-verdict-g':a.aiTotal>=13?'rp-verdict-o':'rp-verdict-r';

  const html = `
    <div class="v2-pane active">
      <div class="v2-badge">AI Report</div>

      </div>
      <div class="v2-card">
        <div style="font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px">Trait-by-trait analysis</div>
        ${traitRows}
      </div>
      <div class="rp-verdict ${vc}">
        <div class="rp-verdict-t">Overall verdict</div>
        <div class="rp-verdict-b">${esc(a.verdict)}</div>
      </div>
      ${a.nextAction?`<div class="rp-action"><div class="rp-action-lbl">Your 7-day action</div><div class="rp-action-text">${esc(a.nextAction)}</div></div>`:''}
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        <button class="v2-btn" style="flex:1" onclick="reScore()">Re-score traits</button>
        <button class="v2-btn v2-btn-p" style="flex:1" onclick="resetAll()">Start fresh</button>
      </div>
      <div style="margin-top:12px">

          <span id="sheet-save-msg"></span>
        </div>
      </div>
    </div>`;

  document.getElementById('content-area').innerHTML = html;
  window.scrollTo(0, 0);
  renderSidebar();
  // Save to Google Sheet in background

}

function adminTab(i) {

function saveGlobal() {
  COURSE_DATA.course_title   = document.getElementById('af-course-title').value;
  COURSE_DATA.course_tagline = document.getElementById('af-course-tagline').value;
  COURSE_DATA.mantra         = document.getElementById('af-mantra').value;
  COURSE_DATA.stats.forEach((_,si) => { COURSE_DATA.stats[si].num = document.getElementById(`af-stat-${si}-num`).value; COURSE_DATA.stats[si].lbl = document.getElementById(`af-stat-${si}-lbl`).value; });
  showToast('Global settings saved!');
  renderLesson(currentIdx);
}
function saveLesson(li) {
  const lesson = COURSE_DATA.lessons[li];
  lesson.nav_title = document.getElementById(`al-${li}-navtitle`).value;
  lesson.nav_sub   = document.getElementById(`al-${li}-navsub`).value;
  lesson.title     = document.getElementById(`al-${li}-title`).value;
  lesson.subtitle  = document.getElementById(`al-${li}-subtitle`).value;
  const vidSec = lesson.sections.find(s => s.type === 'video');
  if (vidSec) { vidSec.url = document.getElementById(`al-${li}-vidurl`).value; vidSec.title = document.getElementById(`al-${li}-vidtitle`).value; }
  const bbSec = lesson.sections.find(s => s.type === 'bb');

  showToast(`Lesson ${li+1} saved!`);
  renderSidebar();
  if (currentIdx === li) renderLesson(li);
}
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, { position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)', background:'var(--green)', color:'#fff', padding:'10px 24px', borderRadius:'8px', fontWeight:'700', fontSize:'14px', zIndex:'9999', boxShadow:'0 8px 32px rgba(0,0,0,.2)', transition:'opacity .3s' });
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function submitFounderForm() {
  const fields = [
    { id: 'ff-name',    key: 'name',    errId: 'ff-name-err',    validate: v => v.trim().length > 1 },
    { id: 'ff-age',     key: 'age',     errId: 'ff-age-err',     validate: v => !isNaN(v) && +v >= 16 && +v <= 90 },
    { id: 'ff-phone',   key: 'phone',   errId: 'ff-phone-err',   validate: v => v.trim().length >= 6 },
    { id: 'ff-email',   key: 'email',   errId: 'ff-email-err',   validate: v => /^[^@]+@[^@]+\.[^@]+$/.test(v.trim()) },
    { id: 'ff-startup', key: 'startup', errId: 'ff-startup-err', validate: v => v.trim().length > 1 },
    { id: 'ff-desc',    key: 'desc',    errId: 'ff-desc-err',    validate: v => v.trim().length > 5 },
  ];
  let ok = true;
  const profile = {};
  fields.forEach(f => {
    const el = document.getElementById(f.id);
    const val = el ? el.value : '';
    const errEl = document.getElementById(f.errId);
    if (!f.validate(val)) {
      ok = false;
      if (el) el.classList.add('error');
      if (errEl) errEl.classList.add('show');
    } else {
      if (el) el.classList.remove('error');
      if (errEl) errEl.classList.remove('show');
      profile[f.key] = val.trim();
    }
  });
  if (!ok) return;
  const db = v2Load();
  db.profile = profile;
  v2Save(db);
  document.getElementById('btn-next').style.display = '';
  goTo(0);
}

// GOOGLE SHEET INTEGRATION
// Saves founder profile + all scores + rationale + AI analysis
// ════════════════════════════════════════════════════════════════
function saveToSheet() {
  const db = v2Load();
  if (!db.analysis) return; // only save when report is complete
  if (db.savedToSheet) { updateSheetStatus('saved', 'Saved to sheet'); return; }

  updateSheetStatus('saving', 'Saving to records…');

  const p = db.profile || {};
  const selfTotal = v2CalcSelfTotal();
  const a = db.analysis;

  const row = {
    timestamp:   new Date().toISOString(),
    name:        p.name || '',
    age:         p.age  || '',
    phone:       p.phone || '',
    email:       p.email || '',
    startup:     p.startup || '',
    desc:        p.desc || '',
    t1_score:    (db.entries.t1||{}).score ?? '',
    t1_rationale:(db.entries.t1||{}).rationale || '',
    t2_score:    (db.entries.t2||{}).score ?? '',
    t2_rationale:(db.entries.t2||{}).rationale || '',
    t3_score:    (db.entries.t3||{}).score ?? '',
    t3_rationale:(db.entries.t3||{}).rationale || '',
    t4_score:    (db.entries.t4||{}).score ?? '',
    t4_rationale:(db.entries.t4||{}).rationale || '',
    t5_score:    (db.entries.t5||{}).score ?? '',
    t5_rationale:(db.entries.t5||{}).rationale || '',
    self_total:  selfTotal,
    ai_t1:       a.traits[0]?.aiScore ?? '',
    ai_t2:       a.traits[1]?.aiScore ?? '',
    ai_t3:       a.traits[2]?.aiScore ?? '',
    ai_t4:       a.traits[3]?.aiScore ?? '',
    ai_t5:       a.traits[4]?.aiScore ?? '',
    ai_total:    a.aiTotal ?? '',
    top_gap:     a.topGap || '',
    verdict:     a.verdict || '',
    next_action: a.nextAction || '',
  };

  google.script.run
    .withSuccessHandler(function() {
      const db2 = v2Load(); db2.savedToSheet = true; v2Save(db2);
      updateSheetStatus('saved', 'Saved to 18startup records');
    })
    .withFailureHandler(function(err) {
      var msg = (err && err.message) || '';
      if (msg.indexOf('not available when running locally') >= 0) {
        updateSheetStatus('error', 'Deploy to Apps Script to enable sheet saving');
      } else {
        updateSheetStatus('error', 'Could not save — please contact admin');
      }
    })
    .appendToSheet(row);
}

function updateSheetStatus(state, msg) {
  const dot = document.getElementById('sheet-dot');
  const txt = document.getElementById('sheet-save-msg');
  if (!dot || !txt) return;
  dot.className = 'sheet-dot ' + state;
  txt.textContent = msg;
}

    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .appendFeedbackToSheet(feedback);
}

// Internal state for feedback form
const _fb = { overall: 0, ai: 0, nps: undefined };

function setStars(which, val) {
  _fb[which] = val;
  document.querySelectorAll(`#star-${which} .fb-star`).forEach((s,i) => {
    s.classList.toggle('active', i < val);
  });
}

function toggleChip(el, group) {
  el.classList.toggle('sel');
}

function selectNPS(val, el) {
  _fb.nps = val;
  document.querySelectorAll('#fb-nps .fb-chip').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
}

function submitFeedback() {
  const db = v2Load();
  const p = db.profile || {};

  // Collect values
  const rating   = document.querySelectorAll('#star-overall .fb-star.active').length;
  const aiRating = document.querySelectorAll('#star-ai .fb-star.active').length;
  const valuable = [...document.querySelectorAll('#fb-valuable .fb-chip.sel')].map(c => c.textContent);
  const npsEls   = [...document.querySelectorAll('#fb-nps .fb-chip.sel')];
  const nps      = npsEls.length ? parseInt(npsEls[0].textContent) : undefined;
  const improve  = (document.getElementById('fb-improve')?.value || '').trim();
  const other    = (document.getElementById('fb-other')?.value || '').trim();

  // Validate required fields
  const errEl = document.getElementById('fb-err-msg');
  if (!rating) { errEl.textContent = 'Please rate the course (stars).'; return; }
  if (!aiRating) { errEl.textContent = 'Please rate the AI analysis (stars).'; return; }
  if (!valuable.length) { errEl.textContent = 'Please select at least one valuable element.'; return; }
  if (nps === undefined) { errEl.textContent = 'Please select a likelihood to recommend (0–10).'; return; }
  errEl.textContent = '';

  const feedbackData = {
    submitted: true, timestamp: new Date().toISOString(),
    name: p.name || '', email: p.email || '', startup: p.startup || '',
    rating, aiRating, valuable, nps, improve, other
  };

  // Show saving state
  document.getElementById('fb-body').innerHTML = '<div class="fb-saving">Saving your feedback…</div>';

  // Save feedback to localStorage and then to sheet
  const db2 = v2Load();
  db2.feedback = feedbackData;
  v2Save(db2);

  // Save feedback to sheet (fire and forget)
  saveFounderFeedbackToSheet(feedbackData);

  // Close modal and trigger callback (PDF download)
  setTimeout(() => {
    document.getElementById('fb-overlay').classList.remove('open');
    if (typeof _feedbackCallback === 'function') {
      _feedbackCallback();
      _feedbackCallback = null;
    }
  }, 800);
}

// ── Boot ──────────────────────────────────────────────────────
(function boot() {
  const _db = v2Load();
  if (_db.analysis) { currentView = 'report'; goReport(); }
  else if (_db.profile && _db.profile.name) { currentView = 'lesson'; goTo(0); }
  else { showFounderForm(); }
})();
</script>
</body>
</html>
